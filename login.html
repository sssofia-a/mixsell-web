<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dock Studio · Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --border: rgba(0,0,0,0.09);
      --text: #0a0a0f;
      --muted: #777788;
      --cyan: #00aacc;
      --pink: #e0008a;
      --yellow: #c8a800;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'Space Mono', monospace;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-link {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-link span { color: var(--text); font-weight: 600; }
    .nav-link:hover span { text-decoration: underline; }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
    }

    .card-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 36px;
    }
    .card-subtitle a {
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
    }
    .card-subtitle a:hover { text-decoration: underline; }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 7px;
    }
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .label-row label { margin-bottom: 0; }
    .forgot {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .forgot:hover { color: var(--text); }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #aaa;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
      background: #fff;
    }
    input::placeholder { color: var(--muted); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      color: #fff;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Dock Studio</a>
  <a href="registro.html" class="nav-link">¿No tienes cuenta? <span>Regístrate</span></a>
</nav>

<div class="page">
  <div class="card">
    <h1 class="card-title">Bienvenido de nuevo</h1>
    <p class="card-subtitle">¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a></p>

    <form>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Contraseña</label>
          <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        </div>
        <input type="password" id="password" placeholder="Tu contraseña">
      </div>

      <button type="submit" class="btn-submit">Iniciar sesión</button>
    </form>
  </div>
</div>

<footer>dock_studio · © 2025</footer>

</body>
</html>
