<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dock Studio · Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --card: #f9f9fb;
      --border: rgba(0,0,0,0.09);
      --text: #0a0a0f;
      --muted: #777788;
      --cyan: #00aacc;
      --pink: #e0008a;
      --yellow: #c8a800;
      --purple: #7c22d4;
      --green: #009966;
      --red: #cc0033;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 40px 24px 0;
    }

    .logo-main {
      font-family: var(--mono);
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--pink) 50%, var(--yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      text-decoration: none;
      display: inline-block;
    }

    /* ── FORM CONTAINER ── */
    .form-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
    }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .form-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }

    /* ── FIELDS ── */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 7px;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 42px 12px 14px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: #aaa;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    /* estado válido */
    .field input.valid {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,153,102,0.08);
    }

    /* estado inválido */
    .field input.invalid {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(204,0,51,0.08);
    }

    /* ícono de estado dentro del input */
    .status-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .status-icon.show { opacity: 1; }

    /* mensaje de ayuda bajo el input */
    .field-msg {
      font-size: 12px;
      margin-top: 6px;
      min-height: 16px;
      font-family: var(--mono);
      transition: color 0.2s;
    }
    .field-msg.ok  { color: var(--green); }
    .field-msg.err { color: var(--red); }
    .field-msg.info { color: var(--muted); }

    /* barra de fuerza de contraseña */
    .strength-bar-wrap {
      margin-top: 8px;
      display: flex;
      gap: 4px;
    }
    .strength-seg {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    /* ── BOTÓN ── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── LINK LOGIN ── */
    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .login-link a {
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
    }
    .login-link a:hover { text-decoration: underline; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 22px;
      border-radius: 100px;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-family: var(--mono);
    }

    @media (max-width: 480px) {
      .form-card { padding: 28px 20px; border-radius: 16px; }
    }
  </style>
</head>
<body>

<header>
  <a href="index_2.html" class="logo-main">Dock Studio</a>
</header>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">Crear cuenta</div>

    <!-- Nombre -->
    <div class="field">
      <label for="nombre">Nombre completo</label>
      <div class="input-wrap">
        <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="off">
        <span class="status-icon" id="nombre-icon"></span>
      </div>
      <div class="field-msg" id="nombre-msg"></div>
    </div>

    <!-- Usuario -->
    <div class="field">
      <label for="usuario">Nombre de usuario</label>
      <div class="input-wrap">
        <input type="text" id="usuario" placeholder="usuario" autocomplete="off">
        <span class="status-icon" id="usuario-icon"></span>
      </div>
      <div class="field-msg" id="usuario-msg"></div>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Correo electrónico</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="off">
        <span class="status-icon" id="email-icon"></span>
      </div>
      <div class="field-msg" id="email-msg"></div>
    </div>

    <!-- Contraseña -->
    <div class="field">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        <span class="status-icon" id="password-icon"></span>
      </div>
      <div class="strength-bar-wrap">
        <div class="strength-seg" id="seg1"></div>
        <div class="strength-seg" id="seg2"></div>
        <div class="strength-seg" id="seg3"></div>
        <div class="strength-seg" id="seg4"></div>
      </div>
      <div class="field-msg" id="password-msg"></div>
    </div>

    <!-- Confirmar contraseña -->
    <div class="field">
      <label for="confirm">Confirmar contraseña</label>
      <div class="input-wrap">
        <input type="password" id="confirm" placeholder="Repite tu contraseña" autocomplete="new-password">
        <span class="status-icon" id="confirm-icon"></span>
      </div>
      <div class="field-msg" id="confirm-msg"></div>
    </div>

    <button class="btn-submit" id="btn-submit" disabled>Crear cuenta</button>

    <div class="login-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>dock_studio · © 2025</footer>

<script>
  // ── Usuarios ya registrados (simulado — en producción esto viene del backend) ──
  const REGISTERED_USERS = ['trapking', 'soleida', 'samplelab', 'jazzfusion',
    'waverider', 'cosmicflow', 'lareina', 'oldschool', 'admin', 'dockstudio'];

  // Al registrar guarda en localStorage para persistir entre sesiones en la misma demo
  function getStoredUsers() {
    try {
      return JSON.parse(localStorage.getItem('ds_users') || '[]');
    } catch { return []; }
  }

  function isTakenUsername(username) {
    const stored = getStoredUsers().map(u => u.toLowerCase());
    const base   = REGISTERED_USERS.map(u => u.toLowerCase());
    return stored.includes(username.toLowerCase()) || base.includes(username.toLowerCase());
  }

  // ── Referencias ──
  const fields = {
    nombre:   { input: document.getElementById('nombre'),   icon: document.getElementById('nombre-icon'),   msg: document.getElementById('nombre-msg')   },
    usuario:  { input: document.getElementById('usuario'),  icon: document.getElementById('usuario-icon'),  msg: document.getElementById('usuario-msg')  },
    email:    { input: document.getElementById('email'),    icon: document.getElementById('email-icon'),    msg: document.getElementById('email-msg')    },
    password: { input: document.getElementById('password'), icon: document.getElementById('password-icon'), msg: document.getElementById('password-msg') },
    confirm:  { input: document.getElementById('confirm'),  icon: document.getElementById('confirm-icon'),  msg: document.getElementById('confirm-msg')  },
  };

  const segs   = [1,2,3,4].map(n => document.getElementById('seg'+n));
  const btnSubmit = document.getElementById('btn-submit');

  // Estado de validación de cada campo
  const valid = { nombre: false, usuario: false, email: false, password: false, confirm: false };

  // ── Helpers ──
  function setField(key, state, message) {
    // state: 'ok' | 'err' | 'info' | ''
    const f = fields[key];
    f.input.className = state === 'ok' ? 'valid' : state === 'err' ? 'invalid' : '';
    f.icon.textContent = state === 'ok' ? '✓' : state === 'err' ? '✕' : '';
    f.icon.className   = 'status-icon' + (state ? ' show' : '');
    f.msg.textContent  = message || '';
    f.msg.className    = 'field-msg ' + (state === 'ok' ? 'ok' : state === 'err' ? 'err' : 'info');
    valid[key] = state === 'ok';
    updateButton();
  }

  function updateButton() {
    btnSubmit.disabled = !Object.values(valid).every(Boolean);
  }

  // ── Validar nombre ──
  fields.nombre.input.addEventListener('input', function() {
    const v = this.value.trim();
    if (!v) { setField('nombre', '', ''); return; }
    if (v.length < 2) { setField('nombre', 'err', 'Mínimo 2 caracteres.'); return; }
    setField('nombre', 'ok', '');
  });

  // ── Validar usuario ──
  let usuarioTimer;
  fields.usuario.input.addEventListener('input', function() {
    clearTimeout(usuarioTimer);
    let v = this.value.trim().replace(/^@/, ''); // quitar @ si lo escriben
    if (!v) { setField('usuario', '', ''); return; }

    // Formato: solo letras, números, guión bajo, punto
    if (!/^[a-zA-Z0-9_.]{3,20}$/.test(v)) {
      setField('usuario', 'err', 'Solo letras, números, _ o · (3-20 chars).');
      return;
    }

    // Check disponibilidad con pequeño delay (simula petición al servidor)
    setField('usuario', 'info', 'Verificando disponibilidad…');
    fields.usuario.icon.textContent = '⏳';
    fields.usuario.icon.className = 'status-icon show';

    usuarioTimer = setTimeout(() => {
      if (isTakenUsername(v)) {
        setField('usuario', 'err', '@' + v + ' ya está en uso. Elige otro.');
      } else {
        setField('usuario', 'ok', '@' + v + ' está disponible.');
      }
    }, 600);
  });

  // ── Validar email ──
  fields.email.input.addEventListener('input', function() {
    const v = this.value.trim();
    if (!v) { setField('email', '', ''); return; }
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    setField('email', ok ? 'ok' : 'err', ok ? '' : 'Formato de correo inválido.');
  });

  // ── Validar contraseña + barra de fuerza ──
  fields.password.input.addEventListener('input', function() {
    const v = this.value;
    if (!v) {
      setField('password', '', '');
      segs.forEach(s => s.style.background = '');
      // revalidar confirmación si ya tenía algo
      validateConfirm();
      return;
    }

    let strength = 0;
    if (v.length >= 8)                         strength++;
    if (/[A-Z]/.test(v))                       strength++;
    if (/[0-9]/.test(v))                       strength++;
    if (/[^A-Za-z0-9]/.test(v))               strength++;

    const colors = ['#cc0033', '#c8a800', '#00aacc', '#009966'];
    const labels = ['Muy débil', 'Débil', 'Aceptable', 'Fuerte'];

    segs.forEach((s, i) => {
      s.style.background = i < strength ? colors[strength - 1] : 'var(--border)';
    });

    if (v.length < 8) {
      setField('password', 'err', 'Mínimo 8 caracteres.');
    } else {
      setField('password', 'ok', 'Fuerza: ' + labels[strength - 1]);
    }

    validateConfirm();
  });

  // ── Validar confirmación ──
  function validateConfirm() {
    const pass    = fields.password.input.value;
    const confirm = fields.confirm.input.value;
    if (!confirm) { setField('confirm', '', ''); return; }
    if (pass === confirm) {
      setField('confirm', 'ok', 'Las contraseñas coinciden.');
    } else {
      setField('confirm', 'err', 'Las contraseñas no coinciden.');
    }
  }

  fields.confirm.input.addEventListener('input', validateConfirm);

  // ── Submit ──
  function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  btnSubmit.addEventListener('click', function() {
    const username = fields.usuario.input.value.trim().replace(/^@/, '');

    // Guardar usuario en localStorage para que persista en la demo
    const stored = getStoredUsers();
    stored.push(username);
    localStorage.setItem('ds_users', JSON.stringify(stored));

    showToast('✓ Cuenta creada — bienvenido/a a Dock Studio', 3500);

    // Redirigir tras un momento
    setTimeout(() => {
      window.location.href = 'index_2.html';
    }, 2000);
  });
</script>

</body>
</html>
